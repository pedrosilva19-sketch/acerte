<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Acerte!</title>
  <link rel="stylesheet" href="css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="imgs/logo.jpg" type="image/jpeg">
</head>
<body>
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="videos/background.mp4" type="video/mp4">
  </video>

  <section class="login-container">
    <div class="overlay"></div>
    
    <!-- Componente Navbar -->
    <div id="navbar-container"></div>

    <div class="login-card">
      <div class="login-header">
        <h1>Login</h1>
        <p>Entre na sua conta para continuar</p>
      </div>

      <form id="login-form">
        <div class="form-message" id="login-message"></div>
        
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" class="form-control" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" class="form-control" required placeholder="Sua senha">
          <button type="button" class="password-toggle" onclick="togglePassword('login-password')">
            👁️
          </button>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me">
            Lembrar de mim
          </label>
          <a href="#" class="forgot-password">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          Entrar
        </button>

        <div class="register-link">
          Não tem uma conta? <a href="register.html">Cadastre-se</a>
        </div>
      </form>
    </div>
  </section>

  <script src="src/auth.js"></script>
  <script src="src/components.js"></script>
</body>
</html>
