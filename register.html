<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta • Acerte!</title>
  <link rel="stylesheet" href="css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="imgs/logo.jpg" type="image/jpeg">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    
  </style>
</head>
<body>
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="videos/background.mp4" type="video/mp4">
  </video>  

  <section class="register-container">
    <div class="overlay"></div>

    <!-- Componente Navbar -->
    <div id="navbar-container"></div>

    <div class="register-card" data-aos="fade-up" data-aos-duration="1000">
      <div class="register-header">
        <h1>Criar Conta</h1>
        <p>Junte-se à comunidade Acerte! e comece sua preparação</p>
      </div>
      
      <form id="register-form">
        <div id="form-message" class="form-message"></div>
        
        <div class="form-group">
          <label for="name">Nome Completo</label>
          <input type="text" id="name" class="form-control" placeholder="Digite seu nome completo" required>
        </div>
        
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Crie uma senha forte" required>
          <button type="button" class="password-toggle" id="toggle-password">Mostrar</button>
        </div>
        
        <div class="form-group">
          <label for="confirm-password">Confirmar Senha</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Digite a senha novamente" required>
          <button type="button" class="password-toggle" id="toggle-confirm-password">Mostrar</button>
        </div>
        
        <div class="form-check">
          <input type="checkbox" id="terms" class="form-check-input" required>
          <label for="terms" class="form-check-label">
            Concordo com os <a href="#" target="_blank">Termos de Uso</a> e <a href="#" target="_blank">Política de Privacidade</a>
          </label>
        </div>
        
        <button type="submit" class="btn-register">Criar Conta</button>
        
        <div class="login-link">
          Já tem uma conta? <a href="login.html">Faça login</a>
        </div>
      </form>
    </div>
  </section>

  <!-- Componente Footer -->
  <div id="footer-container"></div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="src/rotas.js" defer></script>
  <script src="src/aos.js" defer></script>
  <script src="src/components.js" defer></script>
  
  <script>
    // Script específico para a página de registro
    document.addEventListener('DOMContentLoaded', function() {
      // Inicializar AOS
      if (typeof AOS !== 'undefined') {
        AOS.init();
      }
      
      // Alternar visibilidade da senha
      const togglePassword = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password');
      
      const toggleConfirmPassword = document.getElementById('toggle-confirm-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.textContent = type === 'password' ? 'Mostrar' : 'Ocultar';
      });
      
      toggleConfirmPassword.addEventListener('click', function() {
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
        toggleConfirmPassword.textContent = type === 'password' ? 'Mostrar' : 'Ocultar';
      });
      
      // Validação do formulário
      const registerForm = document.getElementById('register-form');
      const formMessage = document.getElementById('form-message');
      
      registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Limpar mensagens anteriores
        formMessage.className = 'form-message';
        formMessage.textContent = '';
        
        // Obter valores dos campos
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const terms = document.getElementById('terms').checked;
        
        // Validações
        let isValid = true;
        let errorMessage = '';
        
        if (name.length < 2) {
          isValid = false;
          errorMessage = 'Por favor, insira um nome válido.';
        } else if (!isValidEmail(email)) {
          isValid = false;
          errorMessage = 'Por favor, insira um e-mail válido.';
        } else if (password.length < 6) {
          isValid = false;
          errorMessage = 'A senha deve ter pelo menos 6 caracteres.';
        } else if (password !== confirmPassword) {
          isValid = false;
          errorMessage = 'As senhas não coincidem.';
        } else if (!terms) {
          isValid = false;
          errorMessage = 'Você deve aceitar os Termos de Uso e Política de Privacidade.';
        }
        
        if (!isValid) {
          formMessage.className = 'form-message error';
          formMessage.textContent = errorMessage;
          return;
        }
        
        // Simulação de registro bem-sucedido
        // Em um cenário real, aqui seria feita uma requisição para o backend
        formMessage.className = 'form-message success';
        formMessage.textContent = 'Conta criada com sucesso! Redirecionando...';
        
        // Simular redirecionamento após registro
        setTimeout(function() {
          window.location.href = 'dashboard.html'; // Página após registro
        }, 2000);
      });
      
      // Função para validar e-mail
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }
    });
  </script>
</body>
</html>
