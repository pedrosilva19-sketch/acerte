<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro • Acerte!</title>
  <link rel="stylesheet" href="css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="imgs/logo.jpg" type="image/jpeg">
</head>
<body>
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="videos/background.mp4" type="video/mp4">
  </video>

  <section class="login-container">
    <div class="overlay"></div>
    
    <!-- Componente Navbar -->
    <div id="navbar-container"></div>

    <div class="login-card">
      <div class="login-header">
        <h1>Cadastro</h1>
        <p>Crie sua conta para começar</p>
      </div>

      <form id="register-form">
        <div class="form-message" id="register-message"></div>
        
        <div class="form-group">
          <label for="register-name">Nome Completo</label>
          <input type="text" id="register-name" class="form-control" required placeholder="Seu nome completo">
        </div>

        <div class="form-group">
          <label for="register-email">E-mail</label>
          <input type="email" id="register-email" class="form-control" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" class="form-control" required placeholder="Mínimo 6 caracteres" minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('register-password')">
            👁️
          </button>
        </div>

        <div class="form-group">
          <label for="register-confirm-password">Confirmar Senha</label>
          <input type="password" id="register-confirm-password" class="form-control" required placeholder="Digite a senha novamente">
          <button type="button" class="password-toggle" onclick="togglePassword('register-confirm-password')">
            👁️
          </button>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="accept-terms" required>
            Aceito os <a href="#" style="color: var(--primary);">termos de uso</a>
          </label>
        </div>

        <button type="submit" class="btn-login" id="register-btn">
          Criar Conta
        </button>

        <div class="register-link">
          Já tem uma conta? <a href="login.html">Fazer login</a>
        </div>
      </form>
    </div>
  </section>

  <script src="src/auth.js"></script>
  <script src="src/components.js"></script>
</body>
</html>
